<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journey of Love | Jaana</title>
  <meta
    name="description"
    content="A romantic Journey of Love web experience made for Jaana."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "sans-serif"]
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen overflow-x-hidden bg-[#fff5f5] text-rose-950">
  <div class="page-glow page-glow-left" aria-hidden="true"></div>
  <div class="page-glow page-glow-right" aria-hidden="true"></div>
  <div id="hearts-background" class="hearts-background hearts-layer-back" aria-hidden="true"></div>
  <div id="hearts-foreground" class="hearts-background hearts-layer-front" aria-hidden="true"></div>

  <main class="relative z-10 flex min-h-screen items-center justify-center px-4 py-6 sm:px-6 sm:py-10">
    <section
      class="journey-shell w-full max-w-6xl overflow-hidden rounded-[2rem] border border-white/70 bg-white/90 shadow-[0_30px_80px_rgba(244,114,182,0.16)] backdrop-blur-lg"
    >
      <div class="border-b border-rose-100/80 bg-gradient-to-r from-white/70 via-rose-50/90 to-white/70 px-4 py-4 sm:px-8">
        <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
          <div class="min-w-0">
            <p class="text-xs font-semibold uppercase tracking-[0.3em] text-rose-400">Journey of Love</p>
            <h1 class="font-romantic text-[2.15rem] leading-none text-rose-700 sm:text-4xl">A little world for Jaana</h1>
          </div>
          <div class="inline-flex max-w-full items-center gap-2 self-start rounded-full border border-rose-100 bg-white/80 px-4 py-2 text-sm text-rose-500 shadow-sm sm:self-auto">
            <span class="inline-block h-2.5 w-2.5 rounded-full bg-rose-400"></span>
            <span class="truncate sm:whitespace-nowrap">From Abhinav, with all my love</span>
          </div>
        </div>
      </div>

      <div id="app" class="px-4 py-5 sm:px-8 sm:py-8 lg:px-10 lg:py-10"></div>
    </section>
  </main>

  <noscript>
    <div class="fixed inset-x-4 bottom-4 z-20 rounded-2xl border border-rose-200 bg-white px-4 py-3 text-sm text-rose-700 shadow-lg">
      This love story needs JavaScript turned on to play the full journey.
    </div>
  </noscript>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
